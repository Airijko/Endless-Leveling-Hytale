# This is the leveling formula for the server. It is used to calculate the amount of experience required to level up.
default:
  expression: "base * ((log(level)+1) * (sqrt(level)))^1.75"
  base: 50

# If you change these values, make sure to reset everyone to sync the skill points by do "/el resetskillpointsall"
baseSkillPoints: 12
skillPointsPerLevel: 6

player_level_cap: 75

prestige:
  enabled: true
  level_cap_increase_per_prestige: 25
  base_xp_increase_per_prestige: 10
  # Prestige augment unlock milestones are now fully data-driven.
  # Each rule grants milestone slots for the configured tier.
  # Use explicit prestige_levels for clarity (recommended).
  # Optional: required_player_level gates unlocks until the player reaches that level.
  augment_unlock_tiers:
    - tier: ELITE
      prestige_levels: [2, 4, 6, 8]
    - tier: MYTHIC
      prestige_levels: [10]

  # Prestige reroll milestones for pending augment offers.
  # Each unlocked milestone grants one reroll token for the configured tier.
  augment_reroll_tiers:
    - tier: ELITE
      prestige_levels: [3, 7, 11]
    - tier: MYTHIC
      prestige_levels: [5, 15]

Mob_Leveling:
  Experience:
    Enabled: true
    Scaling:
      Mode: LINEAR
      BonusAtMax: 3.0
      MinMultiplier: 0.2
    XP_Level_Range:
      Enabled: true
      Max_Difference: 15
      Below_Range:
        Multiplier: 0.05
      Above_Range:
        Multiplier: 0.05
    Global_XP_Multiplier: 1.0
  UI:
    Show_Mob_Level: true
    Show_Level_In_Name: true
