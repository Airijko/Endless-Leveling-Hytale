# This is the leveling formula for the server. It is used to calculate the amount of experience required to level up.
default:
  expression: "base * ((log(level)+1) * (sqrt(level)))^1.75"
  base: 50

# If you change these values, make sure to reset everyone to sync the skill points by do "/el resetskillpointsall"
baseSkillPoints: 12
skillPointsPerLevel: 6

player_level_cap: 75

prestige:
  enabled: true
  level_cap_increase_per_prestige: 25
  base_xp_increase_per_prestige: 10

Mob_Leveling:
  Experience:
    Enabled: true
    Scaling:
      Mode: LINEAR
      BonusAtMax: 3.0
      MinMultiplier: 0.2
    XP_Level_Range:
      Enabled: true
      Max_Difference: 15
      Below_Range:
        Multiplier: 0.0
      Above_Range:
        Multiplier: 0.05
    Global_XP_Multiplier: 1.0
  UI:
    Show_Mob_Level: true
    Show_Level_In_Name: true
