# Leveling formula used to calculate XP required for the next level.
default:
  expression: "base * ((log(level)+1) * (sqrt(level)))^1.75"
  # LOG10 (default) or LN
  log_mode: LOG10
  base: 100

# If you change these values, resync player skill points with "/el resetskillpointsall".
baseSkillPoints: 12
skillPointsPerLevel: 5

player_level_cap: 100

# Party XP sharing (simple shared model).
# - Killer always receives 100% of kill XP (solo logic/bonuses still apply).
# - Each in-range party member receives this percentage of the killer's base kill XP.
party_xp_share:
  enabled: true
  range: 25
  member_share_percent: 100

# Optional cap controls for class innate attribute gains.
# These caps apply to class INNATE_ATTRIBUTE_GAIN scaling only.
# - default: fallback cap for attributes not explicitly listed.
# - Use ENDLESS / NONE / UNLIMITED / UNCAPPED / -1 / 0 to disable cap for an attribute. (same crap)
classes:
  innate_attribute_gain_level_caps:
    default: 100
    life_force: ENDLESS

# Augment unlock milestones earned from normal player levels.
# Only for prestige 0; prestige milestones are configured separately under prestige.
# Each entry supports either explicit levels or progressive level milestones:
# - Explicit: levels: [10, 25, 50]
# - Progressive: required_player_level + level_interval (+ optional max_unlocks; -1 = unlimited)
augments:
  unlocks:
    - tier: COMMON
      levels: [5, 15, 35, 45]
    - tier: COMMON
      required_player_level: 10
      level_interval: 10
      max_unlocks: -1
    - tier: ELITE
      levels: [15]
    - tier: LEGENDARY
      levels: [30]
    - tier: MYTHIC
      levels: [50]

prestige:
  enabled: true
  prestige_level_cap: ENDLESS # ENDLESS = no prestige cap; set an integer to cap prestige levels
  level_cap_increase_per_prestige: 10
  base_xp_increase_per_prestige: 20
  # Prestige augment milestone slots by tier.
  # Each entry requires both a prestige condition and an optional player level gate (required_player_level).
  # - Use prestige_levels: [1, 2, ...] for explicit milestones.
  # - Use required_prestige_level + max_unlocks for progressive unlocks (one slot per prestige, up to max_unlocks; -1 = unlimited).
  augment_unlock_tiers:
    - tier: COMMON
      prestige_levels: ["*"] # one COMMON slot every prestige level
      required_player_level: 1 # grant prestige COMMON slot immediately at level 1
    - tier: ELITE
      prestige_levels: [1, 4, 7, 10]
      required_player_level: 15
    - tier: LEGENDARY
      prestige_levels: [10]
      required_player_level: 30
    - tier: MYTHIC
      prestige_levels: [15]
      required_player_level: 50

  # Prestige reroll milestone grants by tier.
  augment_reroll_tiers:
    - tier: ELITE
      prestige_levels: [3, 7, 11]
    - tier: LEGENDARY
      prestige_levels: [4, 10, 14]
    - tier: MYTHIC
      prestige_levels: [5, 15]

Mob_Leveling:
  Level_Source:
    Party_System:
      Enabled: true
      Level_Calculation: "MEDIAN"
      Dominant_Party_Resolution:
        Mode: "MOST_MEMBERS"
      Max_Internal_Level_Gap: 999
  Experience:
    Enabled: true
    Scaling:
      Mode: LINEAR
      BonusAtMax: 3.0
      MinMultiplier: 0.2
    XP_Level_Range:
      Enabled: true
      Max_Difference: 15
      Below_Range:
        Multiplier: 0.05
      Above_Range:
        Multiplier: 0.05
    Additive_Minimum_XP: 50
    Global_XP_Multiplier: 1.0
  UI:
    Show_Mob_Level: true
    Show_Level_In_Name: true
