# This is the leveling formula for the server. It is used to calculate the amount of experience required to level up.
default:
  expression: "base * ((log(level)+1) * (sqrt(level)))^1.75"
  base: 50

# If you change these values, make sure to reset everyone to sync the skill points by do "/el resetskillpointsall"
baseSkillPoints: 12
skillPointsPerLevel: 6

player_level_cap: 100

# =====================================================
# MOB LEVELING CONFIG
# =====================================================

Mob_Leveling:
  Enabled: true

  # Mobs listed here will NEVER be leveled.
  # Supports either exact IDs under ids, keyword matching under keywords, and wildcard '*' in both.
  # Examples: "Undead_*", "*_Horse", "*fish*"
  Blacklist_Mob_Types:
    ids: []
    keywords:
      [
        "Citizen",
        "Antelope",
        "Bat",
        "Jackalope",
        "Camel",
        "Cat",
        "Catfish",
        "Cattle",
        "Chicken",
        "Clownfish",
        "Crab",
        "Crow",
        "Deer",
        "Dog",
        "Duck",
        "Feran",
        "Flamingo",
        "Fox",
        "Frog",
        "Horse",
        "Human",
        "Klop",
        "Lobster",
        "Macaque",
        "Meerkat",
        "Moose",
        "Mouse",
        "Owl",
        "Parrot",
        "Penguin",
        "Pigeon",
        "Pike",
        "Pufferfish",
        "Rainbow_Trout",
        "Ram",
        "Regal_Tang",
        "Cow",
        "Snail",
        "Snake",
        "Sparrow",
        "Vulture",
        "Woodpecker",
        "Sheep",
        "Gecko",
        "Chick",
        "Pig",
        "Rabbit",
        "Turtle",
        "Goat",
        "Squirrel",
        "Raccoon",
        "Badger",
        "Lamb",
        "Camel",
        "Bird",
        "Bluebird",
        "Finch_Green",
        "Owl_Brown",
        "Owl_Snow",
        "Raven",
        "Archaeopteryx",
        "Hawk",
        "Pterodactyl",
        "Fish",
        "Bluegill",
        "Frostgill",
        "Minnow",
        "Piranha_Black",
        "Piranha",
        "Snapjaw",
        "Trout_Rainbow",
        "Eel_Moray",
        "Shark_Hammerhead",
        "Shellfish_Lava",
        "Trilobite*",
        "Whale_Humpback",
        "Jellyfish*",
        "Tang",
        "Tang*",
        "Eel",
        "Salmon",
        "Foal",
        "Stag",
        "Merchant",
        "Trader",
        "Frog*",
      ]

  # -------------------------------------------------
  # GLOBAL MOB LEVEL RANGE
  # -------------------------------------------------
  Level_Range:
    Min: 1
    Max: 200

  # -------------------------------------------------
  # HOW MOB LEVELS ARE ASSIGNED
  # -------------------------------------------------
  Level_Source:
    # DISTANCE | PLAYER | MIXED | FIXED
    # MIXED is experimental. report any bugs in https://discord.gg/hfMeu9KWsh
    Mode: "MIXED"

    # Mob level is based on distance from spawn / world center
    Distance_Level:
      Start_Level: 1
      Blocks_Per_Level: 100
      Max_Level: 200
      Min_Level: 1
      # Set to "SPAWN" to use the world spawn point, or "x,z" for specific coordinates.
      Center_Coordinates: "SPAWN"

    # MIXED chooses ONE source per mob (PLAYER or DISTANCE) using Player_Weight,
    # then keeps that source locked for the mob lifecycle.
    # Exception: if DISTANCE resolves below the player-floor guardrail,
    # the mob is switched to PLAYER source.
    # Player_Weight is 0.0 to 1.0:
    # 0.0 = always DISTANCE, 1.0 = always PLAYER
    Mixed:
      Player_Weight: 0.5

    # Mob level is based on the player's level
  Player_Based:
    Offset: 0
    Min_Difference: -5
    Max_Difference: 10

    # -------------------------------
    # PARTY-BASED LEVELING EXTENSION
    # -------------------------------
    Party_System:
      Enabled: true

      # Radius from mob spawn location that checks
      # for party members influencing scaling
      Influence_Radius: 25

      # How party level is calculated
      # AVERAGE | MEDIAN
      Level_Calculation: "AVERAGE"

      # If multiple parties are inside Influence_Radius,
      # this determines how the dominant party is selected.
      Dominant_Party_Resolution:
        Mode: "MOST_MEMBERS"
        # MOST_MEMBERS | CLOSEST_MEMBER | HIGHEST_AVERAGE

      # If party internal level gap exceeds this value,
      # no special handling occurs — XP penalties handle it.
      # This exists for optional future logic.
      Max_Internal_Level_Gap: 999

    # Used when Mode is FIXED
    Fixed_Level:
      Level: 10

  # -------------------------------------------------
  # MOB STAT SCALING
  # -------------------------------------------------
  Scaling:
    Health:
      Enabled: true
      Base_Multiplier: 1.0 # Initial health multiplier
      Per_Level: 0.075 # +7.5% HP per mob level

    Damage:
      Enabled: true
      Base_Multiplier: 1.0 # Initial damage multiplier
      Per_Level: 0.05 # +5% Damage per mob level

    Defense:
      # Level difference is (mobLevel - playerLevel), using XP_Level_Range.Max_Difference as the in-range bound.
      # -Max_Difference -> At_Negative_Max_Difference
      # +Max_Difference -> At_Positive_Max_Difference
      # values below/above that range use the corresponding Below/Above values.
      Enabled: true
      At_Negative_Max_Difference: 0.0 # e.g. mob is -Max_Difference relative to player -> 0% DR
      At_Positive_Max_Difference: 0.8 # e.g. mob is +Max_Difference relative to player -> 80% DR
      Below_Negative_Max_Difference: 0.0 # e.g. mob is below -Max_Difference relative to player
      Above_Positive_Max_Difference: 0.9 # e.g. mob is above +Max_Difference relative to player -> 85% DR

  # -------------------------------------------------
  # EXPERIENCE & ANTI-EXPLOIT RULES
  # -------------------------------------------------
  Experience:
    Enabled: true

    Scaling:
      Mode: LINEAR
      BonusAtMax: 3.0
      # XP bonus applied when the target is at Max_Difference levels above the player
      # 0.0 = no bonus, 1.0 = +100% XP, 2.0 = +200% XP

      MinMultiplier: 0.2
      # Minimum XP multiplier applied before hard cutoffs
      # Does NOT override Above_Range or Below_Range multipliers

    # Controls when XP is awarded based on level difference
    XP_Level_Range:
      Enabled: true

      # No XP if the player is this many levels
      # above OR below the mob
      Max_Difference: 15

      # Hard cutoffs
      Below_Range:
        Multiplier: 0.0 # Player too weak → no XP

      Above_Range:
        Multiplier: 0.05 # Player too strong → 5% XP

    # Optional global XP multiplier
    Global_XP_Multiplier: 1.0

  # -------------------------------------------------
  # VISUALS & PLAYER FEEDBACK
  # -------------------------------------------------
  UI:
    Show_Mob_Level: true
