# Event hooks for server-side automation.
# Commands support placeholders:
# {player_name}, {player}, {player_uuid}, {player_level},
# {old_prestige_level}, {new_prestige_level}, {prestige_level},
# {old_player_level}, {new_player_level}, {level}

events:
  prestige_level_up:
    enabled: true
    # Run as console (false) or as the player (true).
    as_player: false
    # "*" = every prestige level, "[1,2,3]" = specific prestige levels.
    commands:
      "*":
        - "say {player_name} reached prestige {new_prestige_level}!"

  player_level_up:
    enabled: true
    # Run as console (false) or as the player (true).
    as_player: false
    # Default for mapped command groups:
    # true = recur each prestige cycle, false = prestige 0 only.
    repeat_access_prestiges: true
    # "*/5" = every 5 levels, "[10,20,30]" = specific levels.
    # In mapped rules, use prestige_levels to target specific prestiges.
    commands:
      "*/10":
        repeat_access_prestiges: true
        commands:
          - "say {player_name} reached level {level}!"
      "[10]":
        repeat_access_prestiges: false
        commands:
          - "give {player_name} Armor_Copper_Head 1"
          - "give {player_name} Armor_Copper_Chest 1"
          - "give {player_name} Armor_Copper_Hands 1"
          - "give {player_name} Armor_Copper_Legs 1"
          - "give {player_name} Weapon_Sword_Copper 1"
      # "[25]":
      #   prestige_levels: [2] # Only trigger at prestige 2, regardless of repeat_access_prestiges
      #   commands:
      #     - "say {player_name} hit level 25 on prestige {prestige_level}!"
