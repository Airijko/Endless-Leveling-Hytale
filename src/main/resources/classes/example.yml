class_name: "Example"
description: "Template class showcasing supported fields."
role: "Template"
category: "default" # Maps to config.yml -> defense_caps.categories.<category>
enabled: false
icon: "Potion_Health"

weapons:
  - type: SWORD
    damage: 1.25 # +25% damage
  - type: AXE
    damage: 1.15 # +15% damage
  - type: BOW
    damage: 1.10 # +10% damage
  - type: STAFF
    damage: 1.05 # +5% damage
  - type: DAGGER
    damage: 1.20 # +20% damage
  - type: MACE
    damage: 1.30 # +30% damage
  - type: SPEAR
    damage: 1.10 # +10% damage
  - type: CROSSBOW
    damage: 1.15 # +15% damage
  - type: WAND
    damage: 1.05 # +5% damage

passives:
  - type: XP_BONUS
    value: 1.0 # +100% XP gain
  - type: HEALTH_REGEN
    value: 0.025 # Heal 2.5% of max HP every 5 seconds
  - type: MANA_REGEN
    value: 0.02 # Restore 2% of max mana every 5 seconds
  - type: HEALING_BONUS
    value: 0.2 # +20% healing dealt/received
  - type: SPECIAL_CHARGE_BONUS
    value: 1.0 # +100% faster special charge
  - type: SECOND_WIND
    value: 0.5 # Heal 50% of max HP
    threshold: 0.2 # Trigger when below 20% HP
    duration: 10 # Lasts for 10 seconds
    cooldown: 60 # seconds between triggers
  - type: FIRST_STRIKE
    value: 2.0 # +200% first-strike bonus descriptor
    flat_bonus_damage: 25 # Flat bonus damage on first hit
    cooldown: 20 # seconds between first-strike windows
  - type: ADRENALINE
    value: 0.8 # Restore 80% of max stamina when drained
    threshold: 0.2 # Trigger below 20% stamina
    duration: 3 # Seconds to spread stamina recovery over
    cooldown: 45 # Seconds between adrenaline bursts
  - type: BERZERKER
    value: 0.2 # Up to +20% damage when hurt (full bonus at/below 35% HP)
    threshold: 0.35 # Health percent required for max bonus; scales to 0% at full health
  - type: RETALIATION
    value: 0.25 # Reflect 25% of damage taken in the window
    window: 4 # Collect damage for 4 seconds before retaliating
    cooldown: 25 # Seconds between retaliations
  - type: EXECUTIONER
    value: 100 # +10000% damage to targets below the threshold
    threshold: 0.2 # Only applies to targets already below 20% HP
    cooldown: 45 # Seconds between executioner procs
  - type: SWIFTNESS
    value: 0.1 # Passive +10% movement speed applied after haste
    duration: 8 # Seconds after killing a target to maintain swiftness bonus
    max_stacks: 8 # Can stack up to 8 times after killing a target for a total of +80% movement speed
  - type: INNATE_ATTRIBUTE_GAIN
    attribute: life_force
    value: 2.0
  - type: INNATE_ATTRIBUTE_GAIN
    attribute: strength
    value: 2.0
  - type: INNATE_ATTRIBUTE_GAIN
    attribute: defense
    value: 2.0
  - type: INNATE_ATTRIBUTE_GAIN
    attribute: haste
    value: 2.0
  - type: INNATE_ATTRIBUTE_GAIN
    attribute: precision
    value: 2.0
  - type: INNATE_ATTRIBUTE_GAIN
    attribute: ferocity
    value: 2.0
  - type: INNATE_ATTRIBUTE_GAIN
    attribute: stamina
    value: 2.0
  - type: INNATE_ATTRIBUTE_GAIN
    attribute: flow
    value: 2.0
  - type: RAVENOUS_STRIKE
    value: 5.0 # Flat healing per hit
    strength_scaling: 0.075 # +7.5% of Strength added to healing
    sorcery_scaling: 0.075 # +7.5% of Sorcery added to healing
