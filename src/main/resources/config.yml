# Core configuration
# Skill attribute scaling per player level
skill_attributes:
  life_force:
    enabled: true
    per_level: 2.5 # Health gained per level
  strength:
    enabled: true
    per_level: 0.5 # Damage bonus per level
  defense:
    enabled: true
    per_level: 0.5 # Damage reduction per level
  haste:
    enabled: true
    per_level: 0.5 # Movement speed per level
  precision:
    enabled: true
    per_level: 0.8 # Critical chance per level
  ferocity:
    enabled: true
    per_level: 1.2 # Critical damage per level
  stamina:
    enabled: true
    per_level: 0.2 # Stamina per level
  sorcery:
    enabled: true
    per_level: 0.75 # Magic damage per level (staffs only)
  flow:
    enabled: true
    per_level: 0.5 # Flow (mana) per level
  discipline:
    enabled: true
    per_level: 0.75 # XP gain bonus percent per level

# Passive skills
# Each passive uses: enabled, unlock_level, base_value, value_per_level, max_level, tier_interval.
passives:
  regeneration:
    enabled: true
    unlock_level: 20
    base_value: 3.0
    value_per_level: 1.5
    max_level: 10
    tier_interval: 8

  luck:
    enabled: true
    unlock_level: 20
    base_value: 2.5
    value_per_level: 2.5
    max_level: 40
    tier_interval: 5

  signature_gain:
    enabled: true
    unlock_level: 15
    base_value: 40.0
    value_per_level: 40.0
    max_level: 10
    tier_interval: 7

  mana_regeneration:
    enabled: true
    unlock_level: 10
    base_value: 1.0
    value_per_level: 0.5
    max_level: 10
    tier_interval: 6

  stamina_gain_bonus:
    enabled: true
    unlock_level: 5
    base_value: 20.0
    value_per_level: 20.0
    max_level: 10
    tier_interval: 5

# Race settings
enable_races: true # Enable or disable the race system
default_race: "Human" # Use built-in fallback default race
choose_race_cooldown: 3600 # Cooldown (seconds) before changing race again
race_max_switches: 1 # -1 = unlimited; 1 = one-time; any positive number caps total race swaps per player
global_race_visuals_setting: "off" # Default race model visuals for new players: on, off, or disabled (disables visuals globally)

# Class settings
enable_classes: true # Enable or disable the class system
enable_secondary_class: true # Enable or disable secondary class assignments globally
default_primary_class: "Adventurer" # Use built-in fallback default primary class
default_secondary_class: "None" # Optional secondary class default (None disables it)
weapon_off_class_damage_penalty: "-40%" # Damage penalty when using a weapon category not listed on your primary class (supports -40%, -0.4, or -40)
choose_class_cooldown: 1800 # Cooldown (seconds) before changing class again
class_max_switches: 1 # -1 = unlimited; positive values apply per slot (primary and, if enabled, secondary each get their own cap)

# Primary class defense cap categories
# Each class .yml can define `category` and that value maps to one of these entries.
# You can add new categories here and assign them in class yml files.
defense_caps:
  roles:
    Mage:
      max_reduction: 40.0
    Marksman:
      max_reduction: 40.0
    Assassin:
      max_reduction: 45.0
    Support:
      max_reduction: 50.0
    Diver:
      max_reduction: 55.0
    Skirmisher:
      max_reduction: 65.0
    BattleMage:
      max_reduction: 65.0
    Juggernaut:
      max_reduction: 80.0
    Vanguard:
      max_reduction: 80.0

# Swap anti-exploit
# Auto-consume one race swap and one class swap-per-slot once players hit the threshold.
swap_anti_exploit:
  consume_at_level_enabled: true # If true, auto-consume 1 race swap and 1 class swap-per-slot at/above threshold
  consume_at_level_threshold: 20 # Level where auto-consumption starts

# Language / localization
language:
  locale: "en_US" # Active locale file from /EndlessLeveling/lang/<locale>.yml
  fallback_locale: "en_US" # Fallback locale when a key is missing

# Community / support
discord_invite_url: "https://discord.gg/hfMeu9KWsh" # Set this to a permanent (non-expiring) Discord invite

# Bundled content sync / customization
# Set these to false if you want to keep custom files instead of bundled updates.
force_builtin_config: true # If true, overwrite config.yml with bundled defaults; if false, migrate existing config values into new template structure
force_builtin_leveling: true # If true, overwrite leveling.yml with bundled defaults; if false, migrate existing leveling values into new template structure
force_builtin_events: false # If true, overwrite events.yml with bundled defaults; if false, migrate existing event-hook values into new template structure
force_builtin_worlds: false # If true, overwrite worlds.yml with bundled defaults; if false, migrate new bundled keys while preserving custom dungeons/variables
force_builtin_races: true # If true, replace races with bundled defaults during sync; if false, custom races are preserved and bundled races are only seeded when the folder has no race .yml files
force_builtin_classes: true # If true, replace classes with bundled defaults during sync; if false, custom classes are preserved and bundled classes are only seeded when the folder has no class .yml files
force_builtin_augments: true # If true, ignore custom augment files and keep bundled augments in sync with updates; if false, deleting an individual augment .yml disables that augment
force_builtin_languages: true # If true, keep bundled language files in sync with updates and archive prior versions to old/

# Builtin content enable/disable (separate from sync settings above)
# These flags control whether EndlessLeveling's default/bundled content is loaded and registered.
# When false, only custom/external content is available; external mods can still register via API.
# Enabled by default if not specified.
enable_builtin_races: true # If false, EndlessLeveling's built-in races are not loaded; custom races and API-registered races still work
enable_builtin_classes: true # If false, EndlessLeveling's built-in classes are not loaded; custom classes and API-registered classes still work
enable_builtin_augments: true # If false, EndlessLeveling's built-in augments are not loaded; custom augments and API-registered augments still work

# Debug / logging
enable_logging: false # Master toggle: true enables ALL mod logs (debug + info + warnings)
logging:
  base_level: WARNING # When enable_logging is false, base level is clamped to WARNING/SEVERE (INFO suppressed unless enable_logging is true or a debug section is enabled).
  debug_sections: [] # Package prefixes to fully enable debug logging, e.g. [augments] or [commands, commands.subcommands]
