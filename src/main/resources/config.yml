# ============================================================
# CONFIGURATION FILE
# ============================================================

# ------------------------------------------------------------
# SKILL ATTRIBUTE SCALING
# Values applied PER PLAYER LEVEL
# ------------------------------------------------------------
skill_attributes:
  life_force:
    enabled: true
    per_level: 2.0 # Health gained per level
  strength:
    enabled: true
    per_level: 0.5 # Damage bonus per level
  defense:
    enabled: true
    per_level: 0.5 # Damage reduction per level
  haste:
    enabled: true
    per_level: 0.75 # Movement speed per level
  precision:
    enabled: true
    per_level: 0.8 # Critical chance per level
  ferocity:
    enabled: true
    per_level: 1.2 # Critical damage per level
  stamina:
    enabled: true
    per_level: 0.2 # Stamina per level
  sorcery:
    enabled: true
    per_level: 0.75 # Magic damage per level (staffs only)
  flow:
    enabled: true
    per_level: 0.5 # Flow (mana) per level
  discipline:
    enabled: true
    per_level: 0.5 # XP gain bonus percent per level

# ------------------------------------------------------------
# PASSIVE SKILLS
# Player passives scale automatically as the player levels up.
#
# Each passive supports:
#   enabled          -> Whether the passive is active
#   unlock_level     -> Player level required to unlock
#   base_value       -> Value at passive level 1
#   value_per_level  -> Increase per passive level
#   max_level        -> Maximum passive level
#   tier_interval    -> Player levels required per passive level
# ------------------------------------------------------------
passives:
  regeneration:
    enabled: true
    unlock_level: 20
    base_value: 3.0
    value_per_level: 1.5
    max_level: 10
    tier_interval: 8

  luck:
    enabled: true
    unlock_level: 20
    base_value: 10.0
    value_per_level: 10.0
    max_level: 10
    tier_interval: 7

  signature_gain:
    enabled: true
    unlock_level: 15
    base_value: 40.0
    value_per_level: 40.0
    max_level: 10
    tier_interval: 7

  mana_regeneration:
    enabled: true
    unlock_level: 10
    base_value: 1.0
    value_per_level: 0.5
    max_level: 10
    tier_interval: 6

  stamina_gain_bonus:
    enabled: true
    unlock_level: 5
    base_value: 20.0
    value_per_level: 20.0
    max_level: 10
    tier_interval: 5

# ------------------------------------------------------------
# RACE SETTINGS
# ------------------------------------------------------------
enable_races: true # Enable or disable the race system
default_race: "Human" # Use built-in fallback default race
choose_race_cooldown: 3600 # Cooldown (seconds) before changing race again
race_max_switches: -1 # -1 = unlimited; 1 = one-time; any positive number caps total race swaps per player
global_race_visuals_setting: "off" # Default race model visuals for new players: on, off, or disabled (disables visuals globally)

# IF YOU WANT TO CREATE CUSTOM RACES, SET THIS TO FALSE AND ADD YOUR RACE FILES TO /EndlessLeveling/races/
force_builtin_races: true # If true, ignore custom race files and keep bundled races in sync with updates

# ------------------------------------------------------------
# CLASS SETTINGS
# ------------------------------------------------------------
enable_classes: true # Enable or disable the class system
enable_secondary_class: true # Enable or disable secondary class assignments globally
default_primary_class: "Adventurer" # Use built-in fallback default primary class
default_secondary_class: "None" # Optional secondary class default (None disables it)
choose_class_cooldown: 1800 # Cooldown (seconds) before changing class again
class_max_switches: -1 # -1 = unlimited; 1 = one-time; any positive number caps total class swaps per player (primary/secondary combined)

# IF YOU WANT TO CREATE CUSTOM CLASSES, SET THIS TO FALSE AND ADD YOUR CLASS FILES TO /EndlessLeveling/races/
force_builtin_classes: true # If true, ignore custom class files and keep bundled classes in sync with updates

# IF YOU WANT TO CREATE CUSTOM AUGMENTS, SET THIS TO FALSE AND ADD YOUR AUGMENT FILES TO /EndlessLeveling/augments/
force_builtin_augments: true # If true, ignore custom augment files and keep bundled augments in sync with updates

# ------------------------------------------------------------
# LANGUAGE / LOCALIZATION
# ------------------------------------------------------------
language:
  locale: "en_US" # Active locale file from /EndlessLeveling/lang/<locale>.yml
  fallback_locale: "en_US" # Fallback locale when a key is missing

# ------------------------------------------------------------
# UI SETTINGS
# ------------------------------------------------------------
# ------------------------------------------------------------
# DEBUG / LOGGING
# ------------------------------------------------------------
enable_logging: false # Master toggle: true enables ALL mod logs (debug + info + warnings)
logging:
  base_level: WARNING # When enable_logging is false, base level is clamped to WARNING/SEVERE (INFO suppressed unless enable_logging is true or a debug section is enabled).
  debug_sections: [] # Inline list of package prefixes to fully enable debug logging for. Examples (uncomment to use):
    # [augments]
    # [augments, managers.AugmentRuntimeManager]
    # [listeners, systems]
    # [commands, commands.subcommands]
    # [managers.PlayerDataManager, managers.AugmentManager]

# ------------------------------------------------------------
# AUGMENT UNLOCKS
# Controls when players receive random augments on level milestones.
# - tier: which augment tier to roll from
# - levels: player levels that trigger a roll
# ------------------------------------------------------------
augments:
  unlocks:
    - tier: ELITE
      levels: [10]
    - tier: ELITE
      levels: [25]
    - tier: MYTHIC
      levels: [50]

# ------------------------------------------------------------
# INTERNAL CONFIG VERSION
# DO NOT MODIFY
# ------------------------------------------------------------
config_version: 21
