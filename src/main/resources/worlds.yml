# Per-world mob leveling overrides.
# World ids are matched case-insensitively.

World_Overrides:
  # Global defaults for all matching worlds unless overridden below.
  Global:
    # Applies to all mobs in this world override, including Mob_Overrides entries.
    Mob_Scaling:
      Mob_Level_Scaling_Difference:
        # Shared +/- level range for defense and damage max-difference scaling.
        Range: 15
      Damage_Max_Difference:
        Enabled: true
        # Same level or lower always uses 1.0x damage.
        At_Positive_Max_Difference: 3.0
        Above_Positive_Max_Difference: 5.0
    Player_Combat_Scaling:
      Player_Level_Scaling_Difference:
        Range: 20
      Defense_Max_Difference:
        At_Positive_Max_Difference: 0.3
        Above_Positive_Max_Difference: 0.6

  default:
    Enabled: true
    Blacklist_Mob_Types:
      ids: []
