          "Chick",
          "Pig",
          "Rabbit",
          "Turtle",
          "Goat",
          "Squirrel",
          "Raccoon",
          "Badger",
          "Lamb",
          "Camel",
          "Bird",
          "Bluebird",
          "Finch_Green",
          "Owl_Brown",
          "Owl_Snow",
          "Raven",
          "Archaeopteryx",
          "Hawk",
          "Pterodactyl",
          "Fish",
          "Bluegill",
          "Frostgill",
          "Minnow",
          "Piranha_Black",
          "Piranha",
          "Snapjaw",
          "Trout_Rainbow",
          "Eel_Moray",
          "Shark_Hammerhead",
          "Shellfish_Lava",
          "Trilobite*",
          "Whale_Humpback",
          "Jellyfish*",
          "Tang",
          "Tang*",
          "Eel",
          "Salmon",
          "Foal",
          "Stag",
          "Merchant",
          "Trader",
          "Frog",
        ]
    Level_Range:
      Min: 1
      Max: 200
    Level_Source:
      Mode: "MIXED"
      Distance_Level:
        Start_Level: 1
        Blocks_Per_Level: 100
        Max_Level: 200
        Min_Level: 1
        Center_Coordinates: "SPAWN"
      Mixed:
        Player_Weight: 0.5
      Fixed_Level:
        # Supports either a flat level or a random range:
        # Level: 50
        # Level: "50-65"
        # Min: 50
        # Max: 65
        Level: 10
      Tiers:
        # Used when Mode: "TIERS"
        # Preferred tier base range key: Base_Level (Fixed_Level still works as fallback).
        Total_Tiers: 1
        Levels_Per_Tier: 20
        Player_Adaptation:
          Enabled: true
          # BELOW: promotes early before next tier min.
          # ABOVE: requires extra levels above the current tier max.
          Allowance_Mode: "BELOW"
          Range_Allowance: 0
      Player_Based:
        Offset: 0
        Min_Difference: -5
        Max_Difference: 10
        # Player mode specific tuning.
        Influence_Radius: 25
    Scaling:
      # Optional per-world override for the level-difference cap used by:
      # - Scaling.Defense.(At/Below/Above)_* fields
      # - Damage_Max_Difference interpolation range
      # Level_Scaling_Difference:
      #   Range: 15
      Health:
        Enabled: true
        Base_Multiplier: 1.0
        Per_Level: 0.075
      Damage:
        Enabled: true
        Base_Multiplier: 1.0
        Per_Level: 0.05
      Defense:
        Enabled: true
        At_Negative_Max_Difference: 0.0
        At_Positive_Max_Difference: 0.8
        Below_Negative_Max_Difference: 0.0
        Above_Positive_Max_Difference: 0.9
    # Disables damage scaling when level difference exceeds the configured threshold, instead of applying the At_Positive_Max_Difference multiplier.
    Damage_Max_Difference:
      Enabled: false

