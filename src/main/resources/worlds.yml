# Per-world mob leveling overrides.
#
# World ids are matched case-insensitively.
# Example wildcard pattern:
#   instance-mj_instance_d01-*

World_Overrides:
  # Global fallback pattern example (optional)
  # "*":
  #   Level_Source:
  #     Mode: "MIXED"

  # Static world exact match
  default:
    Enabled: true
    allow_passive_mob_leveling: false
    Blacklist_Mob_Types:
      ids: []
      keywords:
        [
          "Citizen",
          "Antelope",
          "Bat",
          "Jackalope",
          "Camel",
          "Cat",
          "Catfish",
          "Cattle",
          "Chicken",
          "Clownfish",
          "Crab",
          "Crow",
          "Deer",
          "Dog",
          "Duck",
          "Feran",
          "Flamingo",
          "Fox",
          "Frog",
          "Horse",
          "Human",
          "Klop",
          "Lobster",
          "Macaque",
          "Meerkat",
          "Moose",
          "Mouse",
          "Owl",
          "Parrot",
          "Penguin",
          "Pigeon",
          "Pike",
          "Pufferfish",
          "Rainbow_Trout",
          "Ram",
          "Regal_Tang",
          "Cow",
          "Snail",
          "Snake",
          "Sparrow",
          "Vulture",
          "Woodpecker",
          "Sheep",
          "Gecko",
          "Chick",
          "Pig",
          "Rabbit",
          "Turtle",
          "Goat",
          "Squirrel",
          "Raccoon",
          "Badger",
          "Lamb",
          "Camel",
          "Bird",
          "Bluebird",
          "Finch_Green",
          "Owl_Brown",
          "Owl_Snow",
          "Raven",
          "Archaeopteryx",
          "Hawk",
          "Pterodactyl",
          "Fish",
          "Bluegill",
          "Frostgill",
          "Minnow",
          "Piranha_Black",
          "Piranha",
          "Snapjaw",
          "Trout_Rainbow",
          "Eel_Moray",
          "Shark_Hammerhead",
          "Shellfish_Lava",
          "Trilobite*",
          "Whale_Humpback",
          "Jellyfish*",
          "Tang",
          "Tang*",
          "Eel",
          "Salmon",
          "Foal",
          "Stag",
          "Merchant",
          "Trader",
          "Frog*",
        ]
    Level_Range:
      Min: 1
      Max: 200
    Level_Source:
      Mode: "MIXED"
      Distance_Level:
        Start_Level: 1
        Blocks_Per_Level: 100
        Max_Level: 200
        Min_Level: 1
        Center_Coordinates: "SPAWN"
      Mixed:
        Player_Weight: 0.5
      Fixed_Level:
        # Supports either a flat level or a random range:
        # Level: 50
        # Level: "50-65"
        # Min: 50
        # Max: 65
        Level: 10
    Player_Based:
      Offset: 0
      Min_Difference: -5
      Max_Difference: 10
      Party_System:
        Enabled: true
        Influence_Radius: 25
        Level_Calculation: "AVERAGE"
        Dominant_Party_Resolution:
          Mode: "MOST_MEMBERS"
        Max_Internal_Level_Gap: 999
    Scaling:
      Health:
        Enabled: true
        Base_Multiplier: 1.0
        Per_Level: 0.075
      Damage:
        Enabled: true
        Base_Multiplier: 1.0
        Per_Level: 0.05
      Defense:
        Enabled: true
        At_Negative_Max_Difference: 0.0
        At_Positive_Max_Difference: 0.8
        Below_Negative_Max_Difference: 0.0
        Above_Positive_Max_Difference: 0.9

  # MAJOR DUNGEONS
  instance-mj_instance_d01-*:
    Level_Source:
      Mode: "FIXED"
      Fixed_Level:
        Level: 25-40
    Scaling:
      Health:
        Enabled: true
        Base_Multiplier: 3.0
        Per_Level: 0.075
      Damage:
        Enabled: true
        Base_Multiplier: 1.25
        Per_Level: 0.05
      Defense:
        Enabled: true
        At_Negative_Max_Difference: 0.0
        At_Positive_Max_Difference: 0.8
        Below_Negative_Max_Difference: 0.0
        Above_Positive_Max_Difference: 0.9
    Mob_Overrides:
      Azaroth:
        Level: 50
        Health_Multiplier: 4.0
        Damage_Multiplier: 1.5
        Defense_Multiplier: 0.45

  instance-mj_instance_d02-*:
    Level_Source:
      Mode: "FIXED"
      Fixed_Level:
        Level: 50-65
    Scaling:
      Health:
        Enabled: true
        Base_Multiplier: 3.0
        Per_Level: 0.075
      Damage:
        Enabled: true
        Base_Multiplier: 1.25
        Per_Level: 0.05
      Defense:
        Enabled: true
        At_Negative_Max_Difference: 0.0
        At_Positive_Max_Difference: 0.8
        Below_Negative_Max_Difference: 0.0
        Above_Positive_Max_Difference: 0.9
    Mob_Overrides:
      Katherina:
        Level: 75
        Health_Multiplier: 5.0
        Damage_Multiplier: 2.25
        Defense_Multiplier: 0.55
      Construct_Ancient_Dark_Titan:
        Level: 75
        Health_Multiplier: 4.0
        Damage_Multiplier: 1.5
        Defense_Multiplier: 0.7

  instance-mj_instance_d03-*:
    Level_Source:
      Mode: "FIXED"
      Fixed_Level:
        Level: 75

  instance-mj_instance_d04-*:
    Level_Source:
      Mode: "FIXED"
      Fixed_Level:
        Level: 100
