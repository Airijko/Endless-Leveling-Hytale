          "Trilobite*",
          "Whale_Humpback",
          "Jellyfish*",
          "Tang",
          "Tang*",
          "Eel",
          "Salmon",
          "Foal",
          "Stag",
          "Merchant",
          "Trader",
          "Frog",
        ]
    Level_Range:
      Max: "ENDLESS"
    Level_Source:
      Mode: "MIXED"
      Distance_Level:
        Start_Level: 1
        Blocks_Per_Level: 100
        # Max_Level: 200
        # Min_Level: 1
        Center_Coordinates: "SPAWN"
      Mixed:
        Player_Weight: 0.5
      Player_Based:
        Offset: 0
        Min_Difference: -5
        Max_Difference: 10
        # Player mode tuning.
        Influence_Radius: 25
      # Fixed_Level:
      #   # Supports Level: 50, Level: "50-65", or Min/Max.
      #   Level: 10
    Scaling:
      # Optional per-world override for the level-difference cap used by defense and mob damage scaling.
      Health:
        Enabled: true
        Base_Multiplier: 1.0
        Per_Level: 0.075
      Damage:
        Enabled: true
        Base_Multiplier: 1.0
        Per_Level: 0.05
      Defense:
        Enabled: true
        At_Negative_Max_Difference: -0.2
        At_Positive_Max_Difference: 0.8
        Below_Negative_Max_Difference: -0.4
        Above_Positive_Max_Difference: 0.9
    Mob_Scaling:
      # Set Enabled to false to disable damage scaling past the configured level-difference threshold.
      Damage_Max_Difference:
        Enabled: false

