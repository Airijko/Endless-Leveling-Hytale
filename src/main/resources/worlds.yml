# Per-world mob leveling overrides.
#
# World ids are matched case-insensitively.
# Example wildcard pattern:
#   instance-mj_instance_d01-*

World_Overrides:
  # Global fallback pattern example (optional)
  # "*":
  #   Level_Source:
  #     Mode: "MIXED"

  # Global defaults applied to all worlds unless a world override provides its own value.
  Global:
    Level_Source:
      Party_System:
        Enabled: true
        Level_Calculation: "AVERAGE"
        # Radius used for party XP sharing and TIERS party-level adaptation.
        XP_Share_Range: 25
        Dominant_Party_Resolution:
          Mode: "MOST_MEMBERS"
        Max_Internal_Level_Gap: 999
    Scaling:
      Level_Scaling_Difference:
        # Shared +/- level range used by defense and damage max-difference scaling.
        Range: 15
    # Applies to all mobs in the world override, including Mob_Overrides entries.
    Damage_Max_Difference:
      Enabled: true
      # Same level or lower always uses 1.0x damage.
      At_Positive_Max_Difference: 3.0
      Above_Positive_Max_Difference: 5.0

  # Static world exact match
  default:
    Enabled: true
    Blacklist_Mob_Types:
      ids: []
      keywords:
        [
          "Citizen",
          "Antelope",
          "Bat",
          "Jackalope",
          "Camel",
          "Cat",
          "Catfish",
          "Cattle",
          "Chicken",
          "Clownfish",
          "Crab",
          "Crow",
