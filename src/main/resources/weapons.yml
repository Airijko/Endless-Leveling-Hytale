# All the weapons that will be adjusted by the plugin, with their new values. Modded weapons will be applied if listed below,
# but if not listed, they will be ignored and left with their default values. Vanilla weapons that are not listed below will
# be ignored and left with their default values.

# You can list full item IDs under "ids" or add keywords under "keywords". Keywords match either exact tokens or substrings
# in the item ID (case-insensitive). Unmatched items fall back to the built-in token resolver.

types:
  sword:
    ids:
    # - Example_Sword_Item
    keywords:
      - sword
      - blade
      - saber
      - katana
      - noctivagus
      - yamato
      - rapier

  axe:
    keywords:
      - axe
      - hatchet
      - battleaxe

  gauntlet:
    keywords:
      - gauntlet
      - glove
      - knuckle
      - bracer
      - fist

  bow:
    keywords:
      - bow
      - weaver

  staff:
    keywords:
      - staff
      - rod
      - spellbook
      - wand
      - necronomicon

  dagger:
    keywords:
      - dagger
      - knife
      - dirk
      - whirlwinds

  mace:
    keywords:
      - mace
      - hammer
      - club
      - warhammer

  spear:
    keywords:
      - spear
      - halberd
      - polearm
      - trident
      - glaive

  crossbow:
    keywords:
      - crossbow

  unarmed:
    keywords:
      - fist
