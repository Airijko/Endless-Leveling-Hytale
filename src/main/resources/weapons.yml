# Weapon matching rules used by EndlessLeveling.
# Unlisted weapons keep their default behavior.
# Each key under types is a weapon category name that class files can reference.
# Categories are not hardcoded, so you can add custom entries like longsword.
# Use ids for exact item IDs or keywords for case-insensitive token/substr matching.

types:
  sword:
    ids:
    keywords:
      - sword
      - blade
      - saber
      - katana
      - noctivagus
      - yamato
      - rapier
      - cutlass
      - soulblight

  axe:
    keywords:
      - axe
      - hatchet
      - battleaxe

  gauntlet:
    keywords:
      - gauntlet
      - glove
      - knuckle
      - bracer
      - fist

  bow:
    keywords:
      - bow
      - weaver

  staff:
    keywords:
      - staff
      - rod
      - spellbook
      - wand
      - necronomicon

  dagger:
    keywords:
      - dagger
      - knife
      - dirk
      - whirlwinds

  mace:
    keywords:
      - mace
      - hammer
      - club
      - warhammer

  spear:
    keywords:
      - spear
      - halberd
      - polearm
      - trident
      - glaive

  crossbow:
    keywords:
      - crossbow

  unarmed:
    keywords:
      - fist
