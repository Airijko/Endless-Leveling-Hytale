# ============================================================================
# Race Config Cheat Sheet
# ----------------------------------------------------------------------------
# Metadata
#   race_name        -> Display name for UI and logs.
#   description      -> Short flavor text shown on selection screens.
#   enabled          -> Set to true
# Base Attributes (always-on stats granted by the race)
#   life_force       -> Flat HP baseline before player-earned attributes.
#   strength         -> Base multiplier applied to skill-derived damage bonuses (1.0 = normal).
#   defense          -> Base multiplier applied to skill-derived defense values before curves (1.0 = normal).
#   haste            -> Baseline movement multiplier that multiplies the skill haste bonus (1.0 = normal).
#   precision        -> Base crit chance (use percent values, e.g., 10 = 10%).
#   ferocity         -> Base crit damage bonus (50 = +50%).
#   stamina          -> Flat stamina pool.
#   flow     -> Flat mana/flow pool.
# ----------------------------------------------------------------------------
# Passive Reference (declare under `passives:` using `- type: <PASSIVE>`)
# Optional metadata for every passive entry:
#   layer: Which damage layer the modifier participates in (BASE, ATTRIBUTE, BONUS, CRITICAL, WEAPON)
#   tag:   Logical tag to group stacking inside a layer (values with the same tag stack together)
#   stacking: ADDITIVE (default), DIMINISHING, UNIQUE

#   XP_BONUS
#     -> `value`: decimal percent bonus XP gained (1.0 = +100% XP)

#   HEALTH_REGEN
#     -> `value`: decimal percent of max HP regenerated over 5 seconds (e.g., 0.02 = 2% every 5s)

#   MANA_REGEN
#     -> `value`: decimal percent of max mana regenerated over 5 seconds

#   HEALING_BONUS
#     -> `value`: decimal percent bonus to healing done and received

#   SPECIAL_CHARGE_BONUS
#     -> `value`: decimal percent multiplier applied to the final special-charge bonus from skills (e.g., 1.0 = double the skill bonus)

#   SECOND_WIND
#     -> `value`: decimal percent health healed when below a health threshold
#     -> `threshold`: player health percent to trigger effect
#     -> `duration`: seconds the restoration is spread over
#     -> `cooldown`: seconds between triggers

#   FIRST_STRIKE
#     -> `value`: decimal percent extra damage on the first hit per target
#     -> `cooldown`: seconds between procs

#   ADRENALINE
#     -> `value`: decimal percent of max stamina restored when below a stamina threshold
#     -> `threshold`: player stamina percent to trigger effect
#     -> `duration`: seconds the restoration is spread over
#     -> `cooldown`: seconds between triggers

#   BERZERKER
#     -> `value`: decimal percent max damage increase when at or below the threshold
#     -> `threshold`: health percent where the max bonus applies (scales linearly down to 0% at full HP)

#   RETALIATION
#     -> `value`: decimal percent of damage taken that is reflected after the window expires
#     -> `window`: damage accumulation period in seconds
#     -> `cooldown`: seconds between activations

#   EXECUTIONER
#     -> `value`: decimal percent bonus damage (e.g., 0.25 = +25%). Values >= 1.0 execute the target.
#     -> `threshold`: target health percent (e.g., 0.3 = below 30% HP)
#     -> `cooldown`: seconds between executions/bonus procs (lowest configured value wins)

#   SWIFTNESS
#     -> `value`: decimal percent bonus applied to the final movement speed after haste (e.g., 0.05 = +5%)

#   INNATE_ATTRIBUTE_GAIN
#     -> `attribute`: which attribute gains bonus
#     -> `value`: flat amount granted per player level (use the same units as skill_attributes)
#     Valid attribute keys: life_force, strength, defense, haste, precision, ferocity, stamina, flow

# ============================================================================

race_name: "Example"
icon: "Ingredient_Life_Essence"
description: "PEEPEE POOPOO"
model_scale: 1.0
enabled: false

attributes: # Base Values
  life_force: 100.0
  strength: 1.0
  defense: 1.0
  haste: 1.0
  precision: 10.0
  ferocity: 50.0
  stamina: 10.0
  flow: 20.0
  sorcery: 1.0
  discipline: 0

passives:
  - type: XP_BONUS
    value: 1.0 # +100% XP gain
  - type: HEALTH_REGEN
    value: 0.025 # Heal 2.5% of max HP every 5 seconds
  - type: MANA_REGEN
    value: 0.02 # Restore 2% of max mana every 5 seconds
  - type: HEALING_BONUS
    value: 0.2 # +20% healing dealt/received
  - type: SPECIAL_CHARGE_BONUS
    value: 1.0 # +100% faster special charge
  - type: SECOND_WIND
    value: 0.5 # Heal 50% of max HP
    threshold: 0.2 # Trigger when below 20% HP
    duration: 10 # Lasts for 10 seconds
    cooldown: 60 # seconds between triggers
  - type: FIRST_STRIKE
    value: 2.0 # +200% first-strike bonus descriptor
    flat_bonus_damage: 25 # Flat bonus damage on first hit
    cooldown: 20 # seconds between first-strike windows
  - type: ADRENALINE
    value: 0.8 # Restore 80% of max stamina when drained
    threshold: 0.2 # Trigger below 20% stamina
    duration: 3 # Seconds to spread stamina recovery over
    cooldown: 45 # Seconds between adrenaline bursts
  - type: BERZERKER
    value: 0.2 # Up to +20% damage when hurt (full bonus at/below 35% HP)
    threshold: 0.35 # Health percent required for max bonus; scales to 0% at full health
  - type: RETALIATION
    value: 0.25 # Reflect 25% of damage taken in the window
    window: 4 # Collect damage for 4 seconds before retaliating
    cooldown: 25 # Seconds between retaliations
  - type: EXECUTIONER
    value: 100 # +10000% damage to targets below the threshold
    threshold: 0.2 # Only applies to targets already below 20% HP
    cooldown: 45 # Seconds between executioner procs
  - type: SWIFTNESS
    value: 0.1 # Passive +10% movement speed applied after haste
    duration: 5 # Seconds after killing a target to maintain swiftness bonus
    max_stacks: 8 # Can stack up to 8 times after killing a target for a total of +80% movement speed
  - type: RAVENOUS_STRIKE
    value: 5.0 # Flat healing per hit
    strength_scaling: 0.075 # +7.5% of Strength added to healing
    sorcery_scaling: 0.075 # +7.5% of Sorcery added to healing
