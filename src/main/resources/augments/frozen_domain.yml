id: frozen_domain
name: "Frozen Domain"
tier: ELITE
description: "Create a freezing aura that slows nearby enemies, steals part of that speed, and fortifies your life force."
category: ON_DAMAGE_TAKEN
enabled: true

ui:
  sections:
    - title: "Buffs"
      body: |
        Slow Percent: +30%
        Stolen Slow Ratio: 0.2x
        Slow Interval: +100%
        Radius: +5
        +1 Block Radius per 400 Max HP
        +100 Life Force
      color: "#8adf9e"
    - title: "Duration"
      body: "Duration: 10s"
      color: "#9ecbff"
    - title: "Cooldown"
      body: "Cooldown: +25"
      color: "#ffd56b"
passives:
  aura_frozen_domain:
    slow_percent: 0.30 # slows targets by 30% of their total movement speed
    stolen_slow_ratio: 0.20 # 20% of applied slow is gained as movement speed per affected target
    radius: 5 # base radius in blocks
    duration: 10 # effect lasts 10 seconds
    cooldown: 25 # effect triggers every 25 seconds
    slow_interval: 1.0 # seconds between each slow application tick
    radius_health_scaling:
      health_per_block: 400 # gain +1 block radius per 400 max HP

  buffs:
    life_force:
      value: 100 # flat life_force bonus
