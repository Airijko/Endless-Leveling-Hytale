id: bailout
name: "Bailout"
tier: ELITE
description: "Cheat death briefly and rapidly decay unless you secure a kill."
category: ON_DEATH
enabled: true

ui:
  sections:
    - title: "Buffs"
      body: |
        Revive Health Percent: +75%
        Drain Max Hp Percent Per Second: +25%
        Missing Health Heal: +25%
      color: "#8adf9e"
    - title: "Rules"
      body: |
        Drains To Zero: Yes
        Cancel On Kill: Yes
      color: "#ffb86b"
    - title: "Cooldown"
      body: "Cooldown: +45"
      color: "#ffd56b"
passives:
  death_prevention:
    cooldown: 45 # seconds
    revive_health_percent: 0.75 # heal 75% of max health on trigger

  health_decay:
    drains_to_zero: true
    drain_max_hp_percent_per_second: 0.25 # lose 25% max HP/s; if no kill, death is forced after the expected drain window
    cancel_on_kill: true # killing a target stops the decay

  emergency_heal:
    missing_health_percent: 0.25 # heal 25% of missing health
