id: shadowstep
name: "Shadowstep"
tier: ELITE
description: "After a kill, slip into brief invisibility and a burst of speed; attacking ends the stealth."
category: ON_KILL

passives:
  invisibility_on_kill:
    duration: 2 # invis + movement buff lasts 2 seconds
    trigger_cooldown: 10 # 10 second cooldown
    effect: INVISIBLE # becomes invisible
    break_conditions:
      attack: true # invisibility breaks if player attacks
    buffs:
      movement_speed:
        value: 0.50 # +50% movement
