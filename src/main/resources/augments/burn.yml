id: burn
name: "Burn"
tier: ELITE
description: "Your presence scorches nearby enemies, dealing damage over time that scales with your maximum health and expanding in size as you grow stronger."
category: ON_DAMAGE_TAKEN
enabled: true

passives:
  aura_burn:
    base_max_hp_percent_per_second: 0.01 # deals 1% of target max HP per second
    bonus_max_hp_scaling: 0.0012 # +0.12% damage per 100 max HP
    radius: 5 # base radius in blocks
    duration: 10 # effect lasts 10 seconds
    cooldown: 30 # effect triggers every 30 seconds
    max_damage_per_tick: 500 # flat cap on burn damage per tick (0 = no cap)
    radius_health_scaling:
      health_per_block: 400 # gain +1 block radius per 400 max HP

  buffs:
    life_force:
      value: 100 # flat life_force bonus
