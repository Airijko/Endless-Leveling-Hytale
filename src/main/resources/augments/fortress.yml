id: fortress
name: "Fortress"
tier: ELITE
description: "At the brink of death you gain a brief shielded immobile phase, then a follow-up window of protection and empowered stats."
category: ON_LOW_HP
enabled: true

ui:
  sections:
    - title: "Buffs"
      body: |
        Min Health Hp: +1%
        +15% Damage Reduction
        +50% Strength & Sorcery
      color: "#8adf9e"
    - title: "Duration"
      body: |
        5s Shielded Phase
        15s Buff Phase
      color: "#9ecbff"
    - title: "Cooldown"
      body: "Cooldown: 100s"
      color: "#ffd56b"
passives:
  shield_phase:
    min_health_hp: 1 # flat HP trigger/floor
    duration: 5 # lasts 5 seconds
    cooldown: 100 # second cooldown

  buff_phase:
    duration: 15 # lasts 15 seconds
    buffs:
      defense:
        value: 0.15 # 15% damage reduction
      strength:
        value: 0.50 # +50% Strength
      sorcery:
        value: 0.50 # +50% Sorcery
