id: phantom_hits
name: Phantom Hits
tier: ELITE
description: Your attacks fire additional phantom strikes that scale with both Strength
  and Sorcery.
category: ON_HIT
enabled: true
weights:
  default: 8
  conditions:
  - when:
      strength_higher_than_sorcery: true
    weight: 60
  - when:
      sorcery_higher_than_strength: true
    weight: 10
ui:
  sections:
  - title: Buffs
    body: '+20 + (10% of Strength & Sorcery)

      '
    color: '#8adf9e'
  - title: Rules
    body: 'Can Crit: Yes'
    color: '#ffb86b'
passives:
  phantom_damage:
    flat_damage: 20
    strength_scaling: 0.1
    sorcery_scaling: 0.1
    can_crit: true
mob_compatible: true
