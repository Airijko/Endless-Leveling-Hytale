id: nesting_doll
name: "Nesting Doll"
tier: MYTHIC
description: "Each death weakens you temporarily, but you can revive multiple times before truly falling."
category: ON_DEATH
enabled: true

ui:
  sections:
    - title: "Buffs"
      body: |
        Revive Count: +2
        Restore After Seconds: +30
        Max Health Regen Percent Per Second: +2%
      color: "#8adf9e"
    - title: "Rules"
      body: "Health Penalty Per Death: 1/3"
      color: "#ffb86b"
passives:
  death_stacks:
    max_deaths: 3
    health_penalty_per_death: 1/3 # lose 1/3 max HP per death
    restore_after_seconds: 30 # max HP restored after 30s out of combat

  regeneration:
    max_health_regen_percent_per_second: 0.02 # 2% max HP regen per second
