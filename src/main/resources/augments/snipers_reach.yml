id: snipers_reach
name: "Sniper's Reach"
tier: MYTHIC
description: "Ranged damage scales with distance, peaking at long range."
category: ON_RANGED_HIT
enabled: true

ui:
  sections:
    - title: "Buffs"
      body: "Max Value: 0-150% Bonus Damage at 30 blocks"
      color: "#8adf9e"
    - title: "Rules"
      body: |
        Min Distance: 5 blocks
        Max Distance: 30 blocks
        Scaling Type: linear
        Attack Type: RANGED
      color: "#ffb86b"
passives:
  bonus_damage_by_distance:
    max_value: 1.5 # 150% bonus damage at max distance
    min_distance: 5 # minimum effective range in blocks
    max_distance: 30 # maximum effective range in blocks
    scaling_type: linear # scales linearly from 0 to max
    attack_type: RANGED # only applies to ranged attacks
