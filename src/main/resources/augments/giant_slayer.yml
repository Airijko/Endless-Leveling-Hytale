id: giant_slayer
name: "Giant Slayer"
tier: MYTHIC
description: "Deal more damage to enemies with higher health than you, scaling with the health gap."
category: ON_HIT
enabled: true

ui:
  sections:
    - title: "Buffs"
      body: "Max Value: +1.8"
      color: "#8adf9e"
    - title: "Rules"
      body: |
        Scaling Stat: TARGET_CURRENT_HP
        Reference Stat: PLAYER_CURRENT_HP
        Max Ratio: 8x
        Calculation: linear
      color: "#ffb86b"
passives:
  bonus_damage_vs_hp_ratio:
    max_value: 1.8 # 180% max bonus damage
    scaling_stat: TARGET_CURRENT_HP
    reference_stat: PLAYER_CURRENT_HP
    max_ratio: 8.0 # max bonus when target has 8x your HP
    calculation: "linear" # scales linearly between equal HP and max_ratio
