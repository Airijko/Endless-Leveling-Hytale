id: blood_echo
name: "Blood Echo"
tier: MYTHIC
description: "Damage dealt returns as healing over time, stacking and clearing when you score a kill."
category: ON_HIT

passives:
  heal_over_time:
    value: 0.20 # 20% of damage dealt as healing
    duration: 3 # heals over 3 seconds
    max_stacks: 5 # can stack up to 5 times
    reset_on_kill: true # all stacks removed on kill
