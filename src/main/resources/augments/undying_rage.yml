id: undying_rage
name: "Undying Rage"
tier: MYTHIC
description: "For a short window you cannot drop below a sliver of health and hit harder as you get lower."
category: ON_LOW_HP

passives:
  rage:
    duration: 10 # lasts 10 seconds
    min_health_hp: 1 # flat HP trigger/floor
    # Legacy alias still supported:
    # health_threshold_hp: 1
    # Optional percent mode instead of flat HP:
    # health_threshold: 0.01
    cooldown: 100 # seconds before it can trigger again after ending

  bonus_damage:
    scaling_stat: missing_health_percent # scales with missing HP
    max_bonus_ferocity: 150 # up to 150% bonus critical damage at full missing HP
    full_value_at_health_percent: 0.05 # full bonus damage when player health is at or below 5%

  buffs:
    precision:
      value: 0.15 # 15% increased critical hit chance
