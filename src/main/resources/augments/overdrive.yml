id: overdrive
name: Overdrive
tier: ELITE
description: Build Haste and Critical Damage with consecutive hits; lose momentum
  when you take damage.
category: ON_HIT
enabled: true
weights:
  default: 8
  conditions:
  - when:
      strength_higher_than_sorcery: true
    weight: 60
  - when:
      sorcery_higher_than_strength: true
    weight: 10
ui:
  sections:
  - title: Buffs
    body: '+4% Haste per stack

      +5% Critical Damage per stack

      Max stacks: 8

      '
    color: '#8adf9e'
  - title: Rules
    body: 'On Damage Taken: Yes

      '
    color: '#ffb86b'
  - title: Duration
    body: 'Duration: 8s'
    color: '#9ecbff'
passives:
  buffs:
    haste:
      value: 0.04
    crit_damage:
      value: 0.05
    max_stacks: 8
  duration:
    seconds: 8
  stack_loss_conditions:
    on_damage_taken: true
mob_compatible: true
