id: overdrive
name: "Overdrive"
tier: ELITE
description: "Build Haste and Critical Damage with consecutive hits; lose momentum when you take damage."
category: ON_HIT
enabled: true

ui:
  sections:
    - title: "Buffs"
      body: |
        +4% Haste per stack
        +5% Critical Damage per stack
        Max stacks: 8
      color: "#8adf9e"
    - title: "Rules"
      body: |
        On Damage Taken: Yes
      color: "#ffb86b"
    - title: "Duration"
      body: "Duration: 8s"
      color: "#9ecbff"
passives:
  buffs:
    haste:
      value: 0.04 # +4% Haste per stack
    crit_damage:
      value: 0.05 # +5% Critical Damage per stack
    max_stacks: 8

  duration:
    seconds: 8 # stack duration; refreshed on each hit

  stack_loss_conditions:
    on_damage_taken: true # lose a stack when taking damage
