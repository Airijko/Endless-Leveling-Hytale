id: reckoning
name: "Reckoning"
tier: MYTHIC
description: "Missing health fuels your damage, but missed attacks drain your own HP."
category: ON_HIT

passives:
  bonus_damage:
    scaling_stat: missing_health_percent # scales with missing HP
    max_bonus_damage: 1.0 # up to 100% bonus damage at full missing HP

  self_damage:
    scaling_stat: attack_miss # triggers only on missed attacks
    percent_of_current_hp: 0.10 # loses 10% of current HP per miss
