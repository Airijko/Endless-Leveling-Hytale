id: reckoning
name: "Reckoning"
tier: MYTHIC
description: "Your attack damage is enhanced at the cost of your health."
category: ON_HIT
enabled: true

ui:
  sections:
    - title: "Buffs"
      body: "Max Bonus Damage: +100%"
      color: "#8adf9e"
    - title: "Debuffs"
      body: "Self Damage: +5%"
      color: "#ff9a9a"
    - title: "Rules"
      body: |
        Scaling Stat: missing_health_percent
        Full Value Threshold: +25%
      color: "#ffb86b"
passives:
  bonus_damage:
    scaling_stat: missing_health_percent # scales with missing HP
    max_bonus_damage: 1 # up to 100% bonus damage at full missing HP
    full_value_at_health_percent: 0.25 # full bonus damage when player health is at or below 25%

  self_damage:
    percent_of_current_hp: 0.05 # loses 5% of current HP per hit

