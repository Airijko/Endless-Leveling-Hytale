id: fleet_footwork
name: Fleet Footwork
tier: ELITE
description: Periodically empower your next strike to heal you and grant a burst of
  speed.
category: ON_HIT
enabled: true
weights:
  default: 8
  conditions:
  - when:
      strength_higher_than_sorcery: true
    weight: 60
  - when:
      sorcery_higher_than_strength: true
    weight: 10
ui:
  sections:
  - title: Buffs
    body: '+25% of damage dealt is returned as healing on hit

      +50% Haste for 3s on hit

      '
    color: '#8adf9e'
  - title: Duration
    body: 'Duration: 3s'
    color: '#9ecbff'
  - title: Cooldown
    body: 'Cooldown: 8s'
    color: '#ffd56b'
passives:
  empowered_hit:
    cooldown: 8
    heal_percent_of_damage: 0.25
  buffs:
    movement_speed:
      value: 0.5
      duration: 3
mob_compatible: true
