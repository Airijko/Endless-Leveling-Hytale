id: fleet_footwork
name: "Fleet Footwork"
tier: ELITE
description: "Periodically empower your next strike to heal you and grant a burst of speed."
category: ON_HIT
enabled: true

ui:
  sections:
    - title: "Buffs"
      body: |
        +25% of damage dealt is returned as healing on hit
        +50% Haste for 3s on hit
      color: "#8adf9e"
    - title: "Duration"
      body: "Duration: 3s"
      color: "#9ecbff"
    - title: "Cooldown"
      body: "Cooldown: 8s"
      color: "#ffd56b"
passives:
  empowered_hit:
    cooldown: 8 # seconds before the effect can trigger again
    heal_percent_of_damage: 0.25 # heal for 25% of the damage dealt

  buffs:
    movement_speed:
      value: 0.50 # +50% movement speed
      duration: 3 # lasts 3 seconds
