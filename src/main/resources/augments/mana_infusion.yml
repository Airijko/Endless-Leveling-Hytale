id: mana_infusion
name: Mana Infusion
tier: ELITE
description: Gain bonus Sorcery equal to a portion of your current Mana.
category: MAGIC_STAT
enabled: true
weights:
  default: 8
  conditions:
  - when:
      sorcery_higher_than_strength: true
    weight: 60
  - when:
      strength_higher_than_sorcery: true
    weight: 10
ui:
  sections:
  - title: Buffs
    body: +20% Sorcery based on current Mana
    color: '#8adf9e'
  - title: Rules
    body: 'Scaling Stat: MANA'
    color: '#ffb86b'
passives:
  buffs:
    sorcery_from_mana:
      value: 0.2
      scaling_stat: MANA
mob_compatible: true
