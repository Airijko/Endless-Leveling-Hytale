id: bloodthirster
name: "Bloodthirster"
tier: MYTHIC
description: "Your strikes grow stronger while healthy and sustain you when wounded."
category: LIFESTEAL
enabled: true

passives:
  hit_counter: 3
  hit_counter_duration: 5 # seconds to complete the shared hit counter before it resets

  healthy_state:
    health_threshold_above: 0.50 # active when above 50% HP
    bonus_damage:
      value: 0.8 # 80% bonus damage on every 3rd hit
    self_damage:
      percent_of_current_hp: 0.10 # lose 10% current HP

  wounded_state:
    health_threshold_below: 0.50 # active when below 50% HP
    healing:
      missing_health_percent: 0.10 # heal 10% missing HP
      strength_scaling: 0.10 # +10% of Strength added to healing
      sorcery_scaling: 0.10 # +10% of Sorcery added to healing
