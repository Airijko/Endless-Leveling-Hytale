id: predator
name: Predator
tier: ELITE
description: Kills grant stacking Haste and Strength while a Defense penalty persists
  until fully stacked.
category: ON_KILL
enabled: true
weights:
  default: 8
  conditions:
  - when:
      strength_higher_than_sorcery: true
    weight: 60
  - when:
      sorcery_higher_than_strength: true
    weight: 10
ui:
  sections:
  - title: Buffs
    body: '+12% Haste per stack

      +6% Strength per stack

      Max stacks: 4

      '
    color: '#8adf9e'
  - title: Debuffs
    body: -10% Defense until max stacks reached
    color: '#ff9a9a'
  - title: Rules
    body: 'Active Until Max Stacks: Yes'
    color: '#ffb86b'
  - title: Duration
    body: 'Duration: 10s'
    color: '#9ecbff'
passives:
  buffs:
    haste:
      value: 0.12
    strength:
      value: 0.06
    max_stacks: 4
  duration:
    seconds: 10
  debuffs:
    defense:
      value: -0.1
      active_until_max_stacks: true
mob_compatible: true
