    value: 0.12 # +12% Haste per stack
    max_stacks: 4
    duration: 10 # seconds
  damage_bonus:
    value: 0.06 # +6% Damage per stack
    max_stacks: 4
    duration: 10 # seconds
  defense_penalty:
    value: -0.10 # -10% Defense
    active_until_max_stacks: true # penalty removed when max stacks reached
