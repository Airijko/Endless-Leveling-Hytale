id: predator
name: "Predator"
tier: ELITE
description: "Kills grant stacking Haste and Strength while a Defense penalty persists until fully stacked."
category: ON_KILL
enabled: true

ui:
  sections:
    - title: "Buffs"
      body: |
        Value: +12%
        Value: +6%
        Max stacks: +4
      color: "#8adf9e"
    - title: "Debuffs"
      body: "Value: -10%"
      color: "#ff9a9a"
    - title: "Rules"
      body: "Active Until Max Stacks: Yes"
      color: "#ffb86b"
    - title: "Duration"
      body: "Seconds: +10"
      color: "#9ecbff"
passives:
  buffs:
    haste:
      value: 0.12 # +12% Haste per stack
    strength:
      value: 0.06 # +6% Strength per stack
    max_stacks: 4

  duration:
    seconds: 10 # stack duration; refreshed on each kill

  debuffs:
    defense:
      value: -0.10 # -10% Defense
      active_until_max_stacks: true # penalty removed when max stacks reached
