id: ambush
name: "Ambush"
tier: ELITE
description: "Stay still to turn invisible, then keep bonus Strength and Sorcery after breaking stealth."
category: PASSIVE_STAT

passives:
  invisibility_on_idle:
    trigger_after_seconds: 5 # triggers after 5 seconds of no movement
    duration: 10 # buff lasts 10 seconds
    buffs:
      strength:
        value: 0.25 # +25% Strength
      sorcery:
        value: 0.25 # +25% Sorcery
    effect: INVISIBLE # makes the player invisible
    break_conditions: # invisibility is broken if any occur
      movement: true
      damage_taken: true
      attack: true
