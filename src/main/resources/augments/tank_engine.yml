id: tank_engine
name: "Tank Engine"
tier: MYTHIC
description: "Sustained combat massively increases your maximum health."
category: PASSIVE_STAT
enabled: true

ui:
  sections:
    - title: "Buffs"
      body: |
        Flat Health Per Stack: +5
        Max Health Multiplier At Max Stacks: 2x
        Percent Max Health Per Stack: +4%
        Max stacks: +25
        Decay Per Second: +5
      color: "#8adf9e"
    - title: "Duration"
      body: "Duration: 8s"
      color: "#9ecbff"
passives:
  stacking_health:
    flat_health_per_stack: 5 # +5 HP per stack
    max_health_multiplier_at_max_stacks: 2.0 # 2.0 means 2x max HP at full stacks (set 1.75 for 1.75x)
    percent_max_health_per_stack: 0.04 # legacy fallback when max_health_multiplier_at_max_stacks is not set
    max_stacks: 25
    duration: 8 # seconds before stacks begin decaying
    decay_per_second: 5 # stacks lost per second after duration expires
    exclude_flat_from_percent_scaling: true # flat HP does not contribute to % scaling
