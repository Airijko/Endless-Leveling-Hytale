id: phase_rush
name: "Phase Rush"
tier: MYTHIC
description: "Rapid attacks accelerate your combat tempo and convert speed into power."
category: ON_HIT
enabled: true

ui:
  sections:
    - title: "On-Hit Passive"
      body: |
        5-Hit Passive
        Hit Counter Duration: 5s
    - title: "Buffs"
      body: |
        +50% Haste
        Conversion Percent: +50%
      color: "#8adf9e"
    - title: "Phase Rush Bonus"
      body: |
        Double your Haste Bonus for 3s after hitting 5 times
      color: "#8adf9e"
    - title: "Buff Duration"
      body: |
        Duration: 3s
      color: "#9ecbff"
passives:
  buffs:
    haste:
      value: 0.50 # +50% base haste

  hit_counter:
    hits_required: 5
    duration: 5 # seconds to complete the hit counter before it resets

  haste_burst:
    multiplier: 2.0 # double haste
    duration: 3 # seconds

  haste_to_damage_conversion:
    conversion_percent: 0.50 # 50% of haste becomes bonus damage
